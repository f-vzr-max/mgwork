name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        env:
          # CI-only stub values; real keys come from Vercel env in deployed branches.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_stub
          CLERK_SECRET_KEY: sk_test_ci_stub
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_stub_anon
          DATABASE_URL: postgresql://postgres:ci_stub@localhost:5432/postgres
          DIRECT_URL: postgresql://postgres:ci_stub@localhost:5432/postgres
        run: npm run build
