# Postgres TLS termination for the self-hosted Supabase box (Mauritius).
#
# Why: Vercel connects with sslmode=require, and Supabase Cloud's TLS endpoint
# is gone when self-hosting. nginx terminates TLS here (reusing the same Let's
# Encrypt cert as the HTTPS API) and forwards plaintext to the pooler/db bound
# on localhost. `stream` is a TOP-LEVEL block (sibling of `http`), so include
# this from the main nginx.conf, not from a site in conf.d/ (which is http-only).
#
# Prereq port layout (set in supabase/docker — verify against your compose):
#   - Supavisor transaction pooler bound to 127.0.0.1:6544
#   - Postgres (direct) bound to 127.0.0.1:5433
#   nginx then OWNS the public 6543 / 5432. The containers must NOT publish on
#   0.0.0.0 — bind them to 127.0.0.1 on the alt ports above, or nginx can't take
#   the public port. (Edit the `ports:` of the db + supavisor services.)
#
# Prereq cert: LE cert for supabase.<your-domain> exists (Caddy writes one when
# it serves :443, or run certbot). Point the paths below at the live cert.

stream {
    log_format pg '$remote_addr [$time_local] $protocol $status '
                  '$bytes_sent $bytes_received $session_time';
    access_log /var/log/nginx/pg-stream.log pg;

    # 6543 — Supavisor transaction pooler. This is the runtime DATABASE_URL for
    # Vercel; MUST be the pooler (serverless opens many short-lived conns).
    server {
        listen 6543 ssl;
        ssl_certificate     /etc/letsencrypt/live/supabase.example.mu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/supabase.example.mu/privkey.pem;
        proxy_pass 127.0.0.1:6544;
    }

    # 5432 — direct Postgres (DIRECT_URL: `prisma migrate deploy`). Expose ONLY
    # if migrations run from the Vercel build. If you migrate on-box instead,
    # delete this server block and drop 5432 from the firewall.
    server {
        listen 5432 ssl;
        ssl_certificate     /etc/letsencrypt/live/supabase.example.mu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/supabase.example.mu/privkey.pem;
        proxy_pass 127.0.0.1:5433;
    }
}
